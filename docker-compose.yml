services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quant_bitcoin}
      POSTGRES_USER: ${POSTGRES_USER:-quant_bitcoin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_bitcoin_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  websocket-ingestor:
    build: .
    environment:
      DATABASE_URL: postgresql://quant_bitcoin:quant_bitcoin_dev@postgres:5432/quant_bitcoin
      SYMBOL: ${SYMBOL:-BTCUSDT}
      INTERVAL: ${INTERVAL:-1m}
      INGEST_MAX_MESSAGES: ${INGEST_MAX_MESSAGES:-unbounded}
      RECONNECT_DELAY_SECONDS: ${RECONNECT_DELAY_SECONDS:-1.0}
      MAX_RECONNECTS: ${MAX_RECONNECTS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - quant-bitcoin-websocket-ingestion
      - ingest

volumes:
  postgres_data:
